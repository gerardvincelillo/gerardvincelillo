<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f0e"/>
      <stop offset="1" stop-color="#071a10"/>
    </linearGradient>

    <filter id="soft">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00ff7f" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00ff7f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .bg { fill: url(#g); }
    .hud { fill: #00ff7f; font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .grid { stroke: rgba(0,255,127,0.10); stroke-width: 1; }
    .core { fill: rgba(0,255,127,0.15); stroke: #00ff7f; stroke-width: 2; }
    .ring { fill: url(#pulse); }
    .swarm { fill: rgba(0,255,127,0.85); }
    .swarmDim { fill: rgba(0,255,127,0.45); }
    .shot { stroke: rgba(0,255,127,0.9); stroke-width: 2; stroke-linecap: round; }
    .warn { fill: rgba(255, 59, 59, 0.85); }
  </style>

  <rect class="bg" x="0" y="0" width="900" height="220" rx="16"/>

  <!-- subtle grid -->
  <g opacity="1">
    <path class="grid" d="M40 30H860M40 70H860M40 110H860M40 150H860M40 190H860"/>
    <path class="grid" d="M80 20V200M140 20V200M200 20V200M260 20V200M320 20V200M380 20V200M440 20V200M500 20V200M560 20V200M620 20V200M680 20V200M740 20V200M800 20V200"/>
  </g>

  <!-- HUD -->
  <text class="hud" x="26" y="34">POLYGON SWARM // DEFENSE VIGNETTE</text>
  <text class="hud" x="26" y="54">mode: contain • detect • automate</text>

  <!-- core -->
  <g transform="translate(720,120)">
    <circle class="ring" r="58">
      <animate attributeName="r" values="40;62;40" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.15;0.55" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <circle class="core" r="22"/>
    <polygon class="core" points="0,-28 24,0 0,28 -24,0" />
  </g>

  <!-- turret / shot lines -->
  <path class="shot" d="M720 120 L560 104">
    <animate attributeName="opacity" values="0;1;0" dur="1.4s" repeatCount="indefinite"/>
  </path>
  <path class="shot" d="M720 120 L540 136">
    <animate attributeName="opacity" values="0;1;0" dur="1.7s" repeatCount="indefinite"/>
  </path>

  <!-- swarm entities -->
  <g filter="url(#soft)">
    <circle class="swarm" cx="140" cy="96" r="7">
      <animate attributeName="cx" values="120;160;120" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;110;90" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle class="swarm" cx="190" cy="130" r="6">
      <animate attributeName="cx" values="170;210;170" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="122;146;122" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="swarm" cx="240" cy="88" r="6">
      <animate attributeName="cx" values="220;260;220" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="82;102;82" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle class="swarmDim" cx="290" cy="148" r="6">
      <animate attributeName="cx" values="270;310;270" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="142;162;142" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle class="swarmDim" cx="330" cy="96" r="5">
      <animate attributeName="cx" values="310;350;310" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;110;90" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="swarmDim" cx="380" cy="124" r="5">
      <animate attributeName="cx" values="360;400;360" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="118;136;118" dur="2.7s" repeatCount="indefinite"/>
    </circle>

    <circle class="warn" cx="520" cy="120" r="6">
      <animate attributeName="r" values="5;7;5" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text class="hud" x="26" y="200">note: SVG vignette • next upgrade: commit-driven generation</text>
</svg>